services:
  - type: web
    name: wire-promise-engine-api
    runtime: python
    plan: free
    buildCommand: cd streamlit_deploy && pip install -r requirements.txt
    startCommand: cd streamlit_deploy && uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
